<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC Auth Backend - Session Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#00ff88;font-family:'Courier New',monospace;font-size:13px;min-height:100vh;padding:20px}
.header{color:#00ff88;font-size:20px;font-weight:500;margin-bottom:16px;border-left:3px solid #00ff88;padding-left:10px}
.stats{display:flex;gap:24px;margin-bottom:16px;font-size:12px;flex-wrap:wrap;align-items:center}
.stat{color:#00cc66}.stat span{color:#00ff88;font-weight:500}
.collision{display:flex;align-items:center;gap:6px;color:#00cc66;font-size:12px}
.dot{width:10px;height:10px;background:#00ff88;border-radius:2px;display:inline-block}
.row{display:flex;gap:8px;margin-bottom:12px}
input[type=text]{flex:1;background:#1a1a1a;border:1px solid #333;color:#00ff88;padding:8px 12px;font-family:'Courier New',monospace;font-size:13px;outline:none}
input[type=text]:focus{border-color:#00ff88}
input[type=text]::placeholder{color:#444}
.btn{background:#00ff88;color:#000;border:none;padding:8px 14px;font-family:'Courier New',monospace;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn:hover{background:#00cc66}
.btn-orange{background:#ff8800;color:#000}.btn-orange:hover{background:#cc6600}
.btn-red{background:#ff3333;color:#fff}.btn-red:hover{background:#cc0000}
.btn-gray{background:#222;color:#aaa;border:1px solid #444}.btn-gray:hover{background:#333;color:#ccc}
.btn-sm{padding:4px 10px;font-size:11px}
.sessions{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.card{background:#111;border:1px solid #1a3a1a;border-left:3px solid #00ff88;padding:14px}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.card-name{color:#ffaa00;font-size:15px;font-weight:500}
.meta{font-size:11px;line-height:2;margin-bottom:8px}
.lbl{color:#00cc66}.val{color:#00aaff}.timer{color:#00ff88}
.url-val{color:#00aaff;cursor:pointer;text-decoration:underline;word-break:break-all}
.rename-row{display:flex;gap:8px;margin-bottom:8px}
.rename-row input{width:220px;flex:none;background:#1a1a1a;border:1px solid #333;color:#00ff88;padding:5px 10px;font-family:'Courier New',monospace;font-size:12px;outline:none}
.rename-row input:focus{border-color:#00ff88}
textarea{width:100%;background:#1a1a1a;border:1px solid #2a2a2a;color:#00aa44;font-family:'Courier New',monospace;font-size:11px;padding:8px;resize:vertical;outline:none;margin-bottom:4px;line-height:1.4;display:block}
textarea:focus{border-color:#00ff88}
.actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.bottom-bar{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid #1a3a1a}
.empty{color:#444;text-align:center;padding:40px}
.err{color:#ff4444;font-size:11px;margin-top:4px;margin-bottom:8px}
.toast{position:fixed;bottom:20px;right:20px;background:#00ff88;color:#000;padding:10px 16px;font-family:'Courier New',monospace;font-size:12px;font-weight:700;display:none;z-index:9999;border-radius:2px}
</style>
</head>
<body>

<div class="header">AC Auth Backend - Session Manager</div>

<div class="stats">
  <div class="stat">Total Sessions: <span id="totalCount">0</span></div>
  <div class="stat">Active Connections: <span id="activeCount">0</span></div>
  <div class="collision"><span class="dot"></span>&nbsp;Collision Detection: <span style="color:#00ff88;margin-left:4px">Active</span></div>
</div>

<div class="row">
  <input type="text" id="searchInput" placeholder="Search by name or ID..." oninput="filterSessions()">
  <button class="btn" onclick="filterSessions()">&#128269; Search</button>
</div>

<div class="row">
  <input type="text" id="newName" placeholder="Enter session name..." onkeydown="if(event.key==='Enter')createSession()">
  <button class="btn" onclick="createSession()">+ Create Session</button>
</div>
<div class="err" id="createErr"></div>

<div class="sessions" id="sessionList"></div>
<div class="empty" id="emptyMsg" style="display:none">No sessions yet. Create one above.</div>

<div class="bottom-bar">
  <button class="btn btn-orange" onclick="refreshAll()">&#8635; Refresh All</button>
  <button class="btn btn-gray" onclick="cleanDuplicates()">&#128465; Clean Duplicates</button>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = "https://ac-auth67-production.up.railway.app";
const STORAGE_KEY = "ac_sessions_v3";
let sessions = [];
let timerInterval = null;

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(t._hide);
  t._hide = setTimeout(() => t.style.display = "none", 2000);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast("Copied!")).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    toast("Copied!");
  });
}

function fmtTime(ms) {
  if (ms <= 0) return "EXPIRED";
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return h + "h " + (m % 60) + "m";
  return m + "m " + (s % 60) + "s";
}

function parseJwtExp(token) {
  try {
    const payload = JSON.parse(atob(token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/")));
    return payload.exp ? payload.exp * 1000 : null;
  } catch(_) { return null; }
}

function genId() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0, v = c=='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); } catch(_) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) sessions = JSON.parse(raw);
  } catch(_) {}
  render();
  startTimers();
}

async function fetchSession(name) {
  try {
    const res = await fetch(BASE + "/v2/account/authenticate/custom/" + encodeURIComponent(name));
    if (!res.ok) return null;
    const data = await res.json();
    return data;
  } catch(_) { return null; }
}

async function createSession() {
  const inp = document.getElementById("newName");
  const errEl = document.getElementById("createErr");
  const name = inp.value.trim();
  errEl.textContent = "";
  if (!name) { errEl.textContent = "Enter a session name."; return; }
  if (sessions.find(s => s.name === name)) { errEl.textContent = "Session '" + name + "' already exists."; return; }

  const url = BASE + "/v2/account/authenticate/custom/" + encodeURIComponent(name);
  const data = await fetchSession(name);

  const id = genId();
  const accessToken = (data && (data.token || data.accessToken)) ? (data.token || data.accessToken) : "";
  const refreshToken = (data && data.refreshToken) ? data.refreshToken : "";
  const tokenExpiry = accessToken ? (parseJwtExp(accessToken) || Date.now() + 43*60*1000) : Date.now() + 43*60*1000;
  const refreshExpiry = refreshToken ? (parseJwtExp(refreshToken) || Date.now() + 5*60*60*1000 + 42*60*1000) : Date.now() + 5*60*60*1000 + 42*60*1000;

  sessions.push({ id, name, url, accessToken, refreshToken, tokenExpiry, refreshExpiry, connections: 0 });
  inp.value = "";
  save();
  render();
  updateStats();
  toast("Session created: " + name);
}

async function refreshSession(id) {
  const s = sessions.find(s => s.id === id);
  if (!s) return;
  const data = await fetchSession(s.name);
  if (data && (data.token || data.accessToken)) {
    s.accessToken = data.token || data.accessToken;
    s.refreshToken = data.refreshToken || s.refreshToken;
    s.tokenExpiry = parseJwtExp(s.accessToken) || Date.now() + 43*60*1000;
    s.refreshExpiry = parseJwtExp(s.refreshToken) || Date.now() + 5*60*60*1000 + 42*60*1000;
    toast("Refreshed: " + s.name);
  } else {
    toast("Backend returned no tokens for: " + s.name);
  }
  save();
  render();
}

async function refreshAll() {
  for (const s of sessions) {
    const data = await fetchSession(s.name);
    if (data && (data.token || data.accessToken)) {
      s.accessToken = data.token || data.accessToken;
      s.refreshToken = data.refreshToken || s.refreshToken;
      s.tokenExpiry = parseJwtExp(s.accessToken) || Date.now() + 43*60*1000;
      s.refreshExpiry = parseJwtExp(s.refreshToken) || Date.now() + 5*60*60*1000 + 42*60*1000;
    }
  }
  save();
  render();
  toast("All sessions refreshed");
}

function updateTokensManual(id) {
  const s = sessions.find(s => s.id === id);
  if (!s) return;
  const at = document.getElementById("at_" + id);
  const rt = document.getElementById("rt_" + id);
  if (at && at.value.trim()) {
    s.accessToken = at.value.trim();
    s.tokenExpiry = parseJwtExp(s.accessToken) || Date.now() + 43*60*1000;
  }
  if (rt && rt.value.trim()) {
    s.refreshToken = rt.value.trim();
    s.refreshExpiry = parseJwtExp(s.refreshToken) || Date.now() + 5*60*60*1000 + 42*60*1000;
  }
  save();
  render();
  toast("Tokens updated");
}

function renameSession(id) {
  const s = sessions.find(s => s.id === id);
  if (!s) return;
  const inp = document.getElementById("rename_" + id);
  if (!inp || !inp.value.trim()) return;
  s.name = inp.value.trim();
  s.url = BASE + "/v2/account/authenticate/custom/" + encodeURIComponent(s.name);
  save();
  render();
  toast("Renamed to " + s.name);
}

function deleteSession(id) {
  sessions = sessions.filter(s => s.id !== id);
  save();
  render();
  updateStats();
  toast("Session deleted");
}

function cleanDuplicates() {
  const seen = new Set();
  sessions = sessions.filter(s => {
    if (seen.has(s.name)) return false;
    seen.add(s.name);
    return true;
  });
  save();
  render();
  updateStats();
  toast("Duplicates removed");
}

function filterSessions() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  let vis = 0;
  document.querySelectorAll(".card").forEach(c => {
    const show = !q || c.dataset.name.toLowerCase().includes(q) || c.dataset.id.toLowerCase().includes(q);
    c.style.display = show ? "" : "none";
    if (show) vis++;
  });
  document.getElementById("emptyMsg").style.display = (sessions.length > 0 && vis === 0) ? "" : "none";
}

function updateStats() {
  document.getElementById("totalCount").textContent = sessions.length;
  document.getElementById("activeCount").textContent = sessions.filter(s => s.connections > 0).length;
}

function updateTimers() {
  const now = Date.now();
  sessions.forEach(s => {
    const tk = document.getElementById("tkTimer_" + s.id);
    const rf = document.getElementById("rfTimer_" + s.id);
    if (tk) tk.textContent = fmtTime(s.tokenExpiry - now);
    if (rf) rf.textContent = fmtTime(s.refreshExpiry - now);
  });
}

function startTimers() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimers, 1000);
}

function render() {
  const list = document.getElementById("sessionList");
  document.getElementById("emptyMsg").style.display = sessions.length === 0 ? "" : "none";
  if (!sessions.length) { list.innerHTML = ""; updateStats(); return; }

  list.innerHTML = sessions.map(s => `
    <div class="card" data-id="${s.id}" data-name="${s.name}">
      <div class="card-header">
        <span style="color:#ffaa00;font-size:16px">&#128193;</span>
        <span class="card-name">${s.name}</span>
        <button class="btn btn-gray btn-sm" onclick="copyText('${s.id}')">&#128203; Copy ID</button>
        <button class="btn btn-gray btn-sm" onclick="copyText('${s.url}')">&#128203; Copy URL</button>
      </div>
      <div class="meta">
        <div><span class="lbl">ID: </span><span class="val">${s.id}</span></div>
        <div><span class="lbl">URL: </span><span class="url-val" onclick="copyText('${s.url}')" title="Click to copy">${s.url}</span></div>
        <div><span class="lbl">Token: </span><span class="timer" id="tkTimer_${s.id}"></span> &nbsp;|&nbsp; <span class="lbl">Refresh: </span><span class="timer" id="rfTimer_${s.id}"></span></div>
        <div><span class="lbl">Connections: </span><span class="val">${s.connections}</span></div>
      </div>
      <div class="rename-row">
        <input type="text" id="rename_${s.id}" value="${s.name}" onkeydown="if(event.key==='Enter')renameSession('${s.id}')">
        <button class="btn btn-orange btn-sm" onclick="renameSession('${s.id}')">Rename</button>
      </div>
      <div>
        <textarea id="at_${s.id}" rows="3" placeholder="Access token...">${s.accessToken || ""}</textarea>
        <textarea id="rt_${s.id}" rows="3" placeholder="Refresh token...">${s.refreshToken || ""}</textarea>
      </div>
      <div class="actions">
        <button class="btn btn-sm" style="background:#00cc66;color:#000" onclick="updateTokensManual('${s.id}')">Update Tokens</button>
        <button class="btn btn-orange btn-sm" onclick="refreshSession('${s.id}')">&#8635; Refresh</button>
        <button class="btn btn-red btn-sm" onclick="deleteSession('${s.id}')">&#128465; Delete</button>
      </div>
    </div>
  `).join("");
  updateStats();
  updateTimers();
}

load();
</script>
</body>
</html>
